# Render Blueprint - JenteraPintar P170 Tuaran
services:
  - type: web
    name: jentera-pintar-backend-p170
    runtime: python
    repo: https://github.com/Jarvis-mql45-dev/jentera-pintar-p170-tuaran.git
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Isi manual di Render Dashboard
      - key: JENTERA_PRODUCTION
        value: "true"
      - key: JENTERA_SECRET_KEY
        generateValue: true
      - key: JENTERA_ALLOWED_ORIGINS
        value: "https://jentera-pintar-p170-tuaran.vercel.app,http://localhost:3000,http://localhost:5173,http://localhost:8000"
      - key: PORT
        value: "10000"