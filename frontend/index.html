<script>
function safeParse(str, fallback = null) { try { return JSON.parse(str); } catch(e) { return fallback; } }
const state = {
    token: localStorage.getItem('token') || null,
    user: safeParse(localStorage.getItem('user'), null),
    currentPage: localStorage.getItem('currentPage') || 'dashboard',
    dashboardDm: '', pengundiSearch: '', pengundiDm: '', pengundiPage: 1, approvalPage: 1,
    pengundiData: null, dashboardData: null, pdmList: [], chart: null,
    surveyPage: 'list', surveyEditId: null, surveyQuestions: [], charts: {},
    dunChartDun: 'N12', dunChartPdm: '', dashboardEditMode: false,
    dashboardLayout: safeParse(localStorage.getItem('dashboardLayout_v2'), null), dashboardItems: []
};
const PDM_BY_DUN = {
    "N12": ["BARU-BARU","BATANGAN","INDAI","KINDU","PENIMBAWAN","SERUSUP","TAMBALANG"],
    "N13": ["BERUNGIS","GAYANG","MARABAHAI","MENGKABONG","NONGKOULUD","TELIPOK","TUARAN BANDAR"],
    "N14": ["GAYARATAU","KILANG BATA","MENGKALADOI","RANI","RENGALIS","RUNGUS","SAWAH","TAMPARULI","TELIBONG","TENGHILAN","TOPOKON"],
    "N15": ["BONGOL","KELAWAT","KIULU","MALANGANG","MANTOB","PAHU","PORING","PUKAK","RANGALAU","SIMPANGAN","TAGINAMBUR","TIONG SIMPODON","TOGOP","TOMIS","TUDAN"]
};
const PDM_DUN_MAP = {
    "BARU-BARU": "N12 SULAMAN", "BATANGAN": "N12 SULAMAN", "INDAI": "N12 SULAMAN", "KINDU": "N12 SULAMAN",
    "PENIMBAWAN": "N12 SULAMAN", "SERUSUP": "N12 SULAMAN", "TAMBALANG": "N12 SULAMAN",
    "BERUNGIS": "N13 PANTAI DALIT", "GAYANG": "N13 PANTAI DALIT", "MARABAHAI": "N13 PANTAI DALIT",
    "MENGKABONG": "N13 PANTAI DALIT", "NONGKOULUD": "N13 PANTAI DALIT", "TELIPOK": "N13 PANTAI DALIT",
    "TUARAN BANDAR": "N13 PANTAI DALIT",
    "GAYARATAU": "N14 TAMPARULI", "KILANG BATA": "N14 TAMPARULI", "MENGKALADOI": "N14 TAMPARULI",
    "RANI": "N14 TAMPARULI", "RENGALIS": "N14 TAMPARULI", "RUNGUS": "N14 TAMPARULI",
    "SAWAH": "N14 TAMPARULI", "TAMPARULI": "N14 TAMPARULI", "TELIBONG": "N14 TAMPARULI",
    "TENGHILAN": "N14 TAMPARULI", "TOPOKON": "N14 TAMPARULI",
    "BONGOL": "N15 KIULU", "KELAWAT": "N15 KIULU", "KIULU": "N15 KIULU", "MALANGANG": "N15 KIULU",
    "MANTOB": "N15 KIULU", "PAHU": "N15 KIULU", "PORING": "N15 KIULU", "PUKAK": "N15 KIULU",
    "RANGALAU": "N15 KIULU", "SIMPANGAN": "N15 KIULU", "TAGINAMBUR": "N15 KIULU",
    "TIONG SIMPODON": "N15 KIULU", "TOGOP": "N15 KIULU", "TOMIS": "N15 KIULU", "TUDAN": "N15 KIULU"
};
function getDunForPdm(pdmItem) {
    const nama = (typeof pdmItem === 'string' ? pdmItem : (pdmItem.nama || '')).toUpperCase().trim();
    if (PDM_DUN_MAP[nama]) return PDM_DUN_MAP[nama];
    for (const [key, dun] of Object.entries(PDM_DUN_MAP)) { if (nama.startsWith(key)) return dun; }
    return null;
}
function groupPdmByDun(pdmList) {
    const groups = {};
    const order = ["N12 SULAMAN", "N13 PANTAI DALIT", "N14 TAMPARULI", "N15 KIULU"];
    order.forEach(dun => groups[dun] = []);
    pdmList.forEach(pdm => {
        const pdmNama = (typeof pdm === 'string' ? pdm : (pdm.nama || ''));
        const dun = getDunForPdm(pdmNama);
        if (dun && groups[dun] && !groups[dun].includes(pdmNama)) groups[dun].push(pdmNama);
    });
    order.forEach(dun => { if (groups[dun].length === 0) delete groups[dun]; });
    return { groups, order: order.filter(dun => groups[dun]) };
}
function renderGroupedPdmOptions(pdmList, selectedValue) {
    const pdmNames = pdmList.map(p => typeof p === 'string' ? p : p.nama);
    const { groups, order } = groupPdmByDun(pdmList);
    let html = '';
    order.forEach(dun => {
        html += `<optgroup label="${dun}">`;
        groups[dun].forEach(pdmNama => { const sel = pdmNama === selectedValue ? ' selected' : ''; html += `<option value="${pdmNama}"${sel}>${pdmNama}</option>`; });
        html += '</optgroup>';
    });
    return html;
}
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8000' : '';
async function api(path, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
    try {
        const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ralat berlaku');
        return data;
    } catch (err) {
        if (err.message.includes('Failed to fetch')) showToast('Gagal menyambung ke pelayan. Pastikan backend sedang berjalan.', 'error');
        throw err;
    }
}
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message; toast.className = `toast toast-${type}`; toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}
async function handleLogin(username, password) {
    try {
        const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ username, kata_laluan: password }) });
        state.token = data.access_token; state.user = data.user;
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        renderApp(); showToast(`Selamat datang, ${data.user.nama_penuh}!`);
    } catch (err) { showToast(err.message, 'error'); }
}
function handleLogout() {
    state.token = null; state.user = null;
    localStorage.removeItem('token'); localStorage.removeItem('user');
    renderApp();
}
function requiresAuth() { return !!(state.token && state.user); }
function checkAdmin() { return state.user?.peranan === 'Admin'; }

                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Nama Pengguna</label><input type="text" id="loginUsername" placeholder="Masukkan nama pengguna" value="admin"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Kata Laluan</label><input type="password" id="loginPassword" placeholder="Masukkan kata laluan" value="admin123"></div>
                    <button onclick="handleLogin(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value)" class="btn btn-primary w-full py-3 text-lg">Log Masuk</button>
                </div>

}

    input.placeholder = placeholder; input.className = 'w-full'; input.style.paddingRight = '30px';
    const hidden = document.createElement('input'); hidden.id = prefix + hiddenId; hidden.type = 'hidden'; hidden.value = '';

    dropdown.id = prefix + dropdownId;
    dropdown.className = 'hidden absolute z-50 bg-white border border-gray-200 rounded-xl shadow-xl mt-1 max-h-48 overflow-y-auto';
    dropdown.style.width = '100%'; dropdown.style.top = '100%'; dropdown.style.left = '0';
    const clearBtn = document.createElement('button');
    clearBtn.type = 'button'; clearBtn.innerHTML = '&times;';
    clearBtn.className = 'absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg leading-none bg-transparent border-0 cursor-pointer';
    clearBtn.style.display = 'none';
    clearBtn.onclick = function(e) { e.preventDefault(); e.stopPropagation(); input.value = ''; hidden.value = ''; selectedItem = null; dropdown.classList.add('hidden'); clearBtn.style.display = 'none'; if (options.onSelect) options.onSelect(null); };
    const inputWrapper = document.createElement('div'); inputWrapper.style.position = 'relative';
    inputWrapper.appendChild(input); inputWrapper.appendChild(clearBtn); inputWrapper.appendChild(hidden);
    const emptyMsg = document.createElement('div'); emptyMsg.className = 'text-sm text-gray-400 text-center py-3 px-2'; emptyMsg.textContent = 'Tiada keputusan';

    function renderResults(results) {
        dropdown.innerHTML = '';

        kosongItem.innerHTML = '<span class="text-gray-400 font-medium">✕ Tiada / Kosong</span>';

        dropdown.appendChild(kosongItem);

    }

        const q = this.value.trim();

            catch (err) { console.error('Search error:', err); }

function showTambahPengundi() {
    const modal = document.createElement('div'); modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
    modal.innerHTML = `<div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto"><h3 class="text-lg font-bold mb-4">Tambah Pengundi Baru</h3><div class="space-y-3"><div><label class="block text-sm font-medium mb-1">No. KP *</label><input id="fNoKp" required maxlength="14" placeholder="12 digit no. KP"></div><div><label class="block text-sm font-medium mb-1">Nama Penuh *</label><input id="fNama" required></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-medium mb-1">Jantina</label><select id="fJantina"><option value="">Pilih (auto)</option><option value="L">Lelaki</option><option value="P">Perempuan</option></select></div><div><label class="block text-sm font-medium mb-1">Tahun Lahir</label><input id="fLahir" type="number" placeholder="Auto dari KP"></div></div><div><label class="block text-sm font-medium mb-1">PDM *</label><select id="fDm" required><option value="">Pilih PDM</option>${state.pdmList.map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div><div><label class="block text-sm font-medium mb-1">Lokaliti</label><input id="fLokaliti"></div><div><label class="block text-sm font-medium mb-1">No. Telefon</label><input id="fTelefon"></div><div><label class="block text-sm font-medium mb-1">Status Sokongan</label><select id="fSokongan"><option value="">Pilih</option><option value="Putih">Putih</option><option value="Atas Pagar">Atas Pagar</option><option value="Hitam">Hitam</option><option value="Tidak Kenal">Tidak Kenal</option></select></div><div><label class="block text-sm font-medium mb-1">Ketua Keluarga</label><div id="fKetuaContainer"></div></div><div><label class="block text-sm font-medium mb-1">Pegawai Penyelaras</label><div id="fPegawaiContainer"></div></div></div><div class="flex gap-3 mt-6 justify-end"><button onclick="this.closest('.fixed').remove()" class="btn btn-outline">Batal</button><button onclick="submitPengundi()" class="btn btn-primary">Simpan</button></div></div>`;
    document.body.appendChild(modal);
    const fKetuaDD = initSearchableDropdown('fKetuaContainer', 'fKetuaInput', 'fKetuaId', 'fKetuaDropdown', { prefix: '', placeholder: 'Cari Ketua Keluarga...' });
    const fPegawaiDD = initSearchableDropdown('fPegawaiContainer', 'fPegawaiInput', 'fPegawaiId', 'fPegawaiDropdown', { prefix: '', placeholder: 'Cari Pegawai Penyelaras...' });
    modal._ketuaDD = fKetuaDD; modal._pegawaiDD = fPegawaiDD;
    setupAutoKiraKp('fNoKp', 'fJantina', 'fLahir', '');
}
async function submitPengundi() { const no_kp = document.getElementById('fNoKp').value.trim(); const nama = document.getElementById('fNama').value.trim(); const dm = document.getElementById('fDm').value; if (!no_kp || !nama || !dm) { showToast('Sila isi ruangan bertanda *', 'error'); return; } const modal = document.querySelector('.fixed'); const ketuaId = modal && modal._ketuaDD ? modal._ketuaDD.getValue() : null; const pegawaiId = modal && modal._pegawaiDD ? modal._pegawaiDD.getValue() : null; try { await api('/api/pengundi', { method:'POST', body:JSON.stringify({ no_kp, nama_penuh:nama, jantina:document.getElementById('fJantina').value||null, tahun_lahir:document.getElementById('fLahir').value?parseInt(document.getElementById('fLahir').value):null, dm, lokaliti:document.getElementById('fLokaliti').value||null, no_telefon:document.getElementById('fTelefon').value||null, status_sokongan:document.getElementById('fSokongan').value||null, ketua_keluarga_id: ketuaId, pegawai_penyelaras_id: pegawaiId }) }); modal?.remove(); showToast('Pengundi berjaya didaftarkan!'); if (typeof renderPengundi === 'function') renderPengundi(); } catch (err) { showToast(err.message, 'error'); } }
async function editPengundi(id) {
    const existingModal = document.getElementById('editPengundiModal');
    if (existingModal) existingModal.remove();
    const modal = document.createElement('div'); modal.id = 'editPengundiModal'; modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
    modal.innerHTML = '<div class="bg-white rounded-xl p-6 text-center shadow-lg font-medium">Memuatkan data pengundi...</div>';
    document.body.appendChild(modal);
    try {
        const p = await api(`/api/pengundi/${id}`);
        modal.innerHTML = `<div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto"><h3 class="text-lg font-bold mb-4">Edit Pengundi</h3><div class="space-y-3"><div><label class="block text-sm font-medium mb-1">No. KP</label><input id="eNoKp" value="${p.no_kp||''}" readonly class="bg-gray-100 cursor-not-allowed"></div><div><label class="block text-sm font-medium mb-1">Nama Penuh</label><input id="eNama" value="${p.nama_penuh||''}"></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-medium mb-1">Jantina</label><select id="eJantina"><option value="">Pilih (auto)</option><option value="L" ${p.jantina==='L'?'selected':''}>Lelaki</option><option value="P" ${p.jantina==='P'?'selected':''}>Perempuan</option></select></div><div><label class="block text-sm font-medium mb-1">Tahun Lahir</label><input id="eLahir" type="number" value="${p.tahun_lahir||''}"></div></div><div><label class="block text-sm font-medium mb-1">PDM</label><select id="eDm"><option value="">Pilih PDM</option>${state.pdmList.map(dm=>`<option value="${dm}" ${p.dm===dm?'selected':''}>${dm}</option>`).join('')}</select></div><div><label class="block text-sm font-medium mb-1">Lokaliti</label><input id="eLokaliti" value="${p.lokaliti||''}"></div><div><label class="block text-sm font-medium mb-1">No. Telefon</label><input id="eTelefon" value="${p.no_telefon||''}"></div><div><label class="block text-sm font-medium mb-1">Status Sokongan</label><select id="eSokongan"><option value="">Pilih</option><option value="Putih" ${p.status_sokongan==='Putih'?'selected':''}>Putih</option><option value="Atas Pagar" ${p.status_sokongan==='Atas Pagar'?'selected':''}>Atas Pagar</option><option value="Hitam" ${p.status_sokongan==='Hitam'?'selected':''}>Hitam</option><option value="Tidak Kenal" ${p.status_sokongan==='Tidak Kenal'?'selected':''}>Tidak Kenal</option></select></div><div><label class="block text-sm font-medium mb-1">Status Fizikal</label><select id="eFizikal"><option value="Hidup" ${p.status_fizikal==='Hidup'?'selected':''}>Hidup</option><option value="Meninggal Dunia" ${p.status_fizikal==='Meninggal Dunia'?'selected':''}>Meninggal Dunia</option></select></div><div><label class="block text-sm font-medium mb-1">Ketua Keluarga</label><div id="eKetuaContainer"></div></div><div><label class="block text-sm font-medium mb-1">Pegawai Penyelaras</label><div id="ePegawaiContainer"></div></div></div><div class="flex gap-3 mt-6 justify-end"><button onclick="this.closest('.fixed').remove()" class="btn btn-outline">Batal</button><button onclick="submitEditPengundi(${id})" class="btn btn-primary">Simpan Perubahan</button></div></div>`;
        const eKetuaDD = initSearchableDropdown('eKetuaContainer', 'eKetuaInput', 'eKetuaId', 'eKetuaDropdown', { prefix: '', placeholder: 'Cari Ketua Keluarga...', excludeId: id });
        const ePegawaiDD = initSearchableDropdown('ePegawaiContainer', 'ePegawaiInput', 'ePegawaiId', 'ePegawaiDropdown', { prefix: '', placeholder: 'Cari Pegawai Penyelaras...', excludeId: id });
        if (p.ketua_keluarga_id) eKetuaDD.setValue(p.ketua_keluarga_id, p.ketua_keluarga_nama || `ID ${p.ketua_keluarga_id}`);
        if (p.pegawai_penyelaras_id) ePegawaiDD.setValue(p.pegawai_penyelaras_id, p.pegawai_penyelaras_nama || `ID ${p.pegawai_penyelaras_id}`);
        modal._ketuaDD = eKetuaDD; modal._pegawaiDD = ePegawaiDD;
        setupAutoKiraKp('eNoKp', 'eJantina', 'eLahir', '');
    } catch (err) { modal.remove(); showToast(err.message, 'error'); }
}

function downloadTemplate() { const token = state.token; fetch(`${API_BASE}/api/pengundi/template`, { headers: { 'Authorization': `Bearer ${token}` } }).then(res => { if (!res.ok) throw new Error('Gagal muat turun'); return res.blob(); }).then(blob => { const url = window.URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'TEMPLAT_IMPORT_PENGUNDI.xlsx'; document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(url); }).catch(err => showToast(err.message, 'error')); }
function handleFileSelect(event) { const file = event.target.files[0]; if (file) setImportFile(file); }
function handleFileDrop(event) { const file = event.dataTransfer.files[0]; if (file) setImportFile(file); }
function setImportFile(file) { if (!file.name.endsWith('.xlsx') && !file.name.endsWith('.xls')) { showToast('Sila pilih fail Excel', 'error'); return; } importFile = file; document.getElementById('fileInfo').classList.remove('hidden'); document.getElementById('fileName').textContent = file.name; document.getElementById('fileSize').textContent = (file.size/1024).toFixed(1)+' KB'; document.getElementById('importBtn').disabled = false; document.getElementById('dropText').textContent = 'Fail dipilih'; }
function clearFile() { importFile = null; document.getElementById('fileInput').value = ''; document.getElementById('fileInfo').classList.add('hidden'); document.getElementById('importBtn').disabled = true; document.getElementById('dropText').textContent = 'Klik atau seret fail ke sini'; }

function renderApp() {
    if (!requiresAuth()) { renderLoginPage(); return; }
    renderSidebar();
    if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('closed');
    else document.getElementById('sidebar').classList.remove('closed');
    document.getElementById('userInfo').innerHTML = `<span class="hidden md:block text-sm text-gray-600">${state.user?.nama_penuh}</span><span class="badge ${state.user?.peranan==='Admin'?'badge-putih':state.user?.peranan==='Petugas Padang'?'badge-atas':'badge-tiada'}">${state.user?.peranan}</span><button onclick="handleLogout()" class="btn btn-danger text-sm flex items-center gap-1.5 px-3 py-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Log Keluar</button>`;
    navigate(state.currentPage);
    if (state.user?.peranan==='Admin') updateApprovalBadge();
}
function toggleSidebar() { const sidebar = document.getElementById('sidebar'); sidebar.classList.toggle('closed'); sidebar.classList.toggle('open'); if (window.innerWidth < 768) { if (sidebar.classList.contains('open')) document.body.classList.add('no-scroll'); else document.body.classList.remove('no-scroll'); } }
document.getElementById('menuToggle')?.addEventListener('click', toggleSidebar);
try { renderApp(); } catch(e) { console.error('[CRITICAL] renderApp() crashed:', e); document.getElementById('sidebar')?.classList.add('hidden'); document.getElementById('pageTitle').textContent = 'Log Masuk'; document.getElementById('userInfo').innerHTML = ''; document.getElementById('contentArea').innerHTML = '<div class="flex items-center justify-center min-h-[70vh]"><div class="card w-full max-w-md p-8 text-center"><div class="w-16 h-16 mx-auto bg-red-100 rounded-full flex items-center justify-center mb-4"><svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg></div><h2 class="text-lg font-bold text-gray-800 mb-2">Ralat Aplikasi</h2><p class="text-sm text-gray-500 mb-4">Aplikasi mengalami masalah teknikal. Sila muat semula halaman.</p><button onclick="location.reload()" class="btn btn-primary">Muat Semula</button></div></div>'; }
setInterval(() => { if (state.user?.peranan==='Admin' && state.token) updateApprovalBadge(); }, 30000);
